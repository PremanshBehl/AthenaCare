version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: athenacare_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: athenacare_secret
      MONGO_INITDB_DATABASE: athenacare
    volumes:
      - mongodb_data:/data/db
    networks:
      - athenacare_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: athenacare_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://admin:athenacare_secret@mongodb:27017/athenacare?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - ./data:/app/data
    depends_on:
      - mongodb
    networks:
      - athenacare_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: athenacare_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - athenacare_network

volumes:
  mongodb_data:

networks:
  athenacare_network:
    driver: bridge
